name: Docker Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      opennebula_version:
        description: 'OpenNebula version to build (optional, auto-detects latest if empty)'
        required: false
        type: string
  schedule:
    - cron: '15 3 * * *'

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: pablodelarco/opennebula

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - name: Detect OpenNebula version
        id: detect
        run: |
          # Use workflow_dispatch input if provided
          if [ -n "${{ github.event.inputs.opennebula_version }}" ]; then
            VERSION="${{ github.event.inputs.opennebula_version }}"
          else
            # Detect latest from OpenNebula downloads page
            VERSION=$(curl -s https://downloads.opennebula.io/repo/ | \
              grep -oP 'href="[0-9]+\.[0-9]+\.[0-9]+/"' | \
              grep -oP '[0-9]+\.[0-9]+\.[0-9]+' | \
              sort -V | tail -1)
          fi
          echo "Detected version: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # workflow_dispatch always builds (explicit user request)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif docker manifest inspect ${{ env.IMAGE_NAME }}:${VERSION} > /dev/null 2>&1; then
            echo "Image already exists for version ${VERSION}, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected, triggering build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-scan-push:
    needs: detect-version
    if: needs.detect-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          trivyignores: 'docker/.trivyignore'

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.detect-version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.detect-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ needs.detect-version.outputs.version }}, latest" >> $GITHUB_STEP_SUMMARY

  update-chart:
    needs: [detect-version, build-scan-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if chart needs update
        id: check
        run: |
          CURRENT=$(grep '^appVersion:' charts/opennebula/Chart.yaml | awk '{print $2}' | tr -d '"')
          DETECTED="${{ needs.detect-version.outputs.version }}"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "detected=$DETECTED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$DETECTED" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Chart appVersion $CURRENT -> $DETECTED"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Chart already at $CURRENT, no update needed"
          fi

      - name: Bump chart version
        if: steps.check.outputs.needs_update == 'true'
        run: |
          DETECTED="${{ steps.check.outputs.detected }}"
          # Update appVersion
          sed -i "s/^appVersion: .*/appVersion: \"${DETECTED}\"/" charts/opennebula/Chart.yaml
          # Bump chart patch version
          CHART_VERSION=$(grep '^version:' charts/opennebula/Chart.yaml | awk '{print $2}')
          MAJOR=$(echo "$CHART_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CHART_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CHART_VERSION" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" charts/opennebula/Chart.yaml
          echo "Chart version: $CHART_VERSION -> $NEW_VERSION"
          echo "new_chart_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add charts/opennebula/Chart.yaml
          git commit -m "chore: bump chart to OpenNebula ${{ steps.check.outputs.detected }}"
          git push

      - name: Trigger chart release
        if: steps.check.outputs.needs_update == 'true'
        run: gh workflow run release-chart.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
