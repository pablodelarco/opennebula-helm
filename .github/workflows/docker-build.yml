name: Docker Build and Push

# Builds the version pinned in docker/ONE_VERSION. New upstream releases are
# proposed as pull requests by the version-watch workflow (with a generated
# release analysis), so every version bump gets human review before anything
# is built or published.

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      opennebula_version:
        description: 'OpenNebula version to build (optional, defaults to the version pinned in docker/ONE_VERSION; other versions get their version tag but never :latest)'
        required: false
        type: string

# Keyed by event name so a manual dispatch rebuild and a push build cannot
# cancel each other
concurrency:
  group: docker-build-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: opennebula/opennebula

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.opennebula_version }}
        run: |
          PINNED=$(tr -d '[:space:]' < docker/ONE_VERSION)
          if [ -z "$PINNED" ]; then
            echo "ERROR: docker/ONE_VERSION is empty"
            exit 1
          fi
          VERSION="${REQUESTED_VERSION:-$PINNED}"
          echo "Building OpenNebula ${VERSION} (pinned: ${PINNED})"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Floating minor alias (e.g. 7.2). Only applied when building the
          # pinned stable version, so it moves forward with each stable
          # release and never points at an older or beta build. No bare-major
          # (7) alias: crossing minors can trigger a DB schema migration, so
          # operators should opt into a minor line explicitly.
          MINOR="${VERSION#*.}"; MINOR="${VERSION%%.*}.${MINOR%%.*}"
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          # Only the pinned version moves :latest, the floating aliases, and
          # the Hub description, so dispatch rebuilds of other versions
          # (including betas) cannot regress them
          if [ "$VERSION" = "$PINNED" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          build-args: |
            ONE_VERSION=${{ steps.version.outputs.version }}

      # Guard against tag/content drift: the image must actually contain the
      # OpenNebula version it will be tagged as
      - name: Verify installed version matches tag
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          INSTALLED=$(docker run --rm --entrypoint dpkg-query ${{ env.IMAGE_NAME }}:scan -W -f='${Version}' opennebula)
          echo "Installed: ${INSTALLED}, expected: ${EXPECTED}"
          if [ "${INSTALLED%%-*}" != "$EXPECTED" ]; then
            echo "ERROR: image contains OpenNebula ${INSTALLED} but would be tagged ${EXPECTED}"
            exit 1
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          trivyignores: 'docker/.trivyignore'

      # Always tag the immutable X.Y.Z. The floating aliases (X.Y, latest) are
      # applied only when building the pinned stable version, so rebuilding an
      # older or pre-release version can't move them.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.is_latest == 'true' && format('{0}:{1}', env.IMAGE_NAME, steps.version.outputs.minor) || '' }}
            ${{ steps.version.outputs.is_latest == 'true' && format('{0}:latest', env.IMAGE_NAME) || '' }}
          build-args: |
            ONE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render Docker Hub description
        if: steps.version.outputs.is_latest == 'true'
        run: sed "s/__ONE_VERSION__/${{ steps.version.outputs.version }}/g" docker/README.md > /tmp/dockerhub-description.md

      - name: Update Docker Hub description
        if: steps.version.outputs.is_latest == 'true'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: /tmp/dockerhub-description.md

      - name: Summary
        run: |
          echo "## Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.version.outputs.version }}${{ steps.version.outputs.is_latest == 'true' && format(', {0}, latest', steps.version.outputs.minor) || '' }}" >> $GITHUB_STEP_SUMMARY
